site_name: PigPig Discord Bot
site_description: An advanced Discord AI Agent bot with modular cognition, memory, and reasoning capabilities.
site_author: starpig1129
site_url: https://starpig1129.github.io/ai-discord-bot-PigPig
repo_name: starpig1129/ai-discord-bot-PigPig
repo_url: https://github.com/starpig1129/ai-discord-bot-PigPig
edit_uri: edit/main/docs/

# Link Validation
validation:
  unrecognized_links: ignore

use_directory_urls: true

theme:
  name: material
  language: zh-TW
  logo: assets/logo.png
  favicon: assets/favicon.png
  font:
    text: Roboto
    code: Roboto Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/starpig1129
    - icon: fontawesome/brands/discord
      link: https://discord.gg/your-invite-link # Replace with real invite if available
    - icon: fontawesome/solid/paper-plane
      link: mailto:your-email@example.com

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - 首頁: index.md
  - 核心組件:
    - 概覽: llm/index.md
    - 模型管理: llm/model_manager.md
    - 調度器 (Orchestrator): llm/orchestrator.md
    - 工具工廠 (Tools Factory): llm/tools_factory.md
    - 上下文管理: llm/context_manager.md
    - 提示詞保護機制: llm/protected_prompt_system.md
    - 資料架構 (Schema): llm/schema.md
  - 功能模組 (Cogs):
    - 概覽: cogs/index.md
    - 記憶系統:
      - 情節記憶: cogs/episodic_memory.md
      - 記憶指令: cogs/memory_commands.md
    - 語言與系統提示:
      - 語言管理: cogs/language_manager.md
      - 系統提示管理: cogs/system_prompt_manager.md
    - 工具類:
      - 網際網路搜尋: cogs/internet_search.md
      - 圖像生成: cogs/gen_img.md
      - GIF 工具: cogs/gif_tools.md
      - 音樂功能: cogs/music.md
      - 數學運算: cogs/math.md
    - 管理與維護:
      - 更新管理: cogs/update_manager.md
      - 頻道管理: cogs/channel_manager.md
      - 用戶資料: cogs/userdata.md
      - 效能監控: cogs/performance.md
    - 其他功能:
      - 提醒功能: cogs/remind.md
      - 總結器: cogs/summarizer.md
      - 故事管理: cogs/story_manager.md
      - 排程: cogs/schedule.md
      - 機器人資訊: cogs/botinfo.md
      - 幫助選單: cogs/help.md
  - 附加組件 (Addons):
    - 概覽: addons/index.md
    - 設定: addons/settings.md
    - 代幣 (Tokens): addons/tokens.md
    - 日誌記錄: addons/logging.md
  - 法律與政策:
    - 隱私政策: PRIVACY_POLICY.md
    - 服務條款: TERMS_OF_SERVICE.md
